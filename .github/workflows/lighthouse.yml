name: Lighthouse CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
      - name: Start Supabase Local
        run: |
          supabase start
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" > apps/dashboard/.env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status | grep 'anon key' | awk '{print $3}')" >> apps/dashboard/.env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status | grep 'service_role key' | awk '{print $3}')" >> apps/dashboard/.env.local
      - name: Build Next.js
        run: pnpm build
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.13.0 autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
