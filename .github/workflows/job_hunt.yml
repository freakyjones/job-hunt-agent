name: Zero-Cost Job Hunt Agent

on:
  schedule:
    # Run twice a day (e.g., 9 AM and 5 PM UTC)
    - cron: '0 9,17 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI
    inputs:
      command:
        description: 'Workflow to run (all, scrape, evaluate, apply)'
        required: false
        default: 'all'

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Sourcing Workflow (Workflow A)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.command == 'all' || github.event.inputs.command == 'scrape' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm --filter job-hunt-agent run start -- scrape


      - name: Run Evaluator Workflow (Workflow B)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.command == 'all' || github.event.inputs.command == 'evaluate' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm --filter job-hunt-agent run start -- evaluate

      - name: Run Auto-Applier Workflow (Workflow C)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.command == 'all' || github.event.inputs.command == 'apply' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm --filter job-hunt-agent run start -- apply

      - name: Upload Playwright Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-error-screenshots
          path: apps/agent/playwright-screenshots/
          retention-days: 7
